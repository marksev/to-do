<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DailyDo</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <!-- ───────────── AUTH VIEW ───────────── -->
  <div id="auth-view">
    <div class="auth-card">
      <div class="auth-logo">
        <span class="logo-icon">✓</span>
        <h1>DailyDo</h1>
        <p>Track your habits, every day.</p>
      </div>

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="tab-btn active" data-tab="login">Login</button>
        <button class="tab-btn" data-tab="signup">Sign Up</button>
      </div>

      <!-- Login Form -->
      <form id="login-form" class="auth-form">
        <div class="field">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="you@example.com" required />
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn-primary">Login</button>
        <p class="auth-error" id="login-error"></p>
      </form>

      <!-- Signup Form -->
      <form id="signup-form" class="auth-form hidden">
        <div class="field">
          <label>Email</label>
          <input type="email" id="signup-email" placeholder="you@example.com" required />
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="signup-password" placeholder="At least 6 characters" required />
        </div>
        <button type="submit" class="btn-primary">Create Account</button>
        <p class="auth-error" id="signup-error"></p>
        <p class="auth-success" id="signup-success"></p>
      </form>
    </div>
  </div>

  <!-- ───────────── APP VIEW ───────────── -->
  <div id="app-view" class="hidden">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <span class="logo-icon">✓</span>
        <span>DailyDo</span>
      </div>
      <nav class="sidebar-nav">
        <button class="nav-btn active" data-view="today">
          <span class="nav-icon">☀️</span> Today
        </button>
        <button class="nav-btn" data-view="calendar">
          <span class="nav-icon">📅</span> Calendar
        </button>
        <button class="nav-btn" data-view="manage">
          <span class="nav-icon">⚙️</span> Manage Tasks
        </button>
      </nav>
      <button id="logout-btn" class="logout-btn">
        <span>⎋</span> Logout
      </button>
    </aside>

    <!-- Main Content -->
    <main class="main-content">

      <!-- ── TODAY VIEW ── -->
      <section id="today-view" class="view-section">
        <div class="view-header">
          <div>
            <h2 id="today-heading">Today</h2>
            <p id="today-date" class="subtitle"></p>
          </div>
          <div class="streak-badge" id="streak-badge">
            <span>🔥</span>
            <span id="streak-count">0</span>
            <span>day streak</span>
          </div>
        </div>

        <div id="today-empty" class="empty-state hidden">
          <p>No tasks yet. Go to <strong>Manage Tasks</strong> to add some!</p>
        </div>

        <div id="todo-list" class="todo-list"></div>
      </section>

      <!-- ── CALENDAR VIEW ── -->
      <section id="calendar-view" class="view-section hidden">
        <div class="view-header">
          <div>
            <h2>Habit Calendar</h2>
            <p class="subtitle">Your daily YES / NO history</p>
          </div>
          <div class="cal-nav">
            <button id="cal-prev" class="cal-nav-btn">‹</button>
            <span id="cal-month-label"></span>
            <button id="cal-next" class="cal-nav-btn">›</button>
          </div>
        </div>

        <div id="calendar-container"></div>

        <div class="cal-legend">
          <span class="legend-item"><span class="dot yes"></span> Yes</span>
          <span class="legend-item"><span class="dot no"></span> No</span>
          <span class="legend-item"><span class="dot none"></span> Not logged</span>
        </div>
      </section>

      <!-- ── MANAGE VIEW ── -->
      <section id="manage-view" class="view-section hidden">
        <div class="view-header">
          <h2>Manage Tasks</h2>
        </div>

        <form id="add-todo-form" class="add-form">
          <input type="text" id="new-todo-input" placeholder="Add a new task…" maxlength="80" required />
          <select id="new-todo-category" class="category-select">
            <option value="OTHER">Other</option>
            <option value="FOOD">Food</option>
          </select>
          <button type="submit" class="btn-primary">+ Add</button>
        </form>

        <div id="manage-empty" class="empty-state hidden">
          <p>No tasks yet. Add your first one above!</p>
        </div>

        <ul id="manage-list" class="manage-list"></ul>
      </section>

    </main>
  </div>

  <!-- Mobile Bottom Nav (appears on small screens) -->
  <nav class="mobile-nav hidden" id="mobile-nav">
    <button class="nav-btn active" data-view="today">☀️<br/><small>Today</small></button>
    <button class="nav-btn" data-view="calendar">📅<br/><small>Calendar</small></button>
    <button class="nav-btn" data-view="manage">⚙️<br/><small>Tasks</small></button>
  </nav>

  <script src="app.js"></script>
</body>
</html>
